{% extends "base.html" %}
{% block title %}登录 - MDM{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-6 col-lg-4">
    <div class="card shadow-sm">
      <div class="card-body">
        <h1 class="h4 mb-3">选择用户（演示）</h1>
        {% if error %}
        <div class="alert alert-danger">{{ error }}</div>
        {% endif %}
        <form method="post" action="/web/login">
          <div class="mb-3">
            <label class="form-label">用户</label>
            <select class="form-select" name="username" required>
              {% for u in users %}
              <option value="{{ u.username }}">
                {{ u.display_name }} — {{ u.username }}{% if u.is_admin %}（管理员）{% endif %}
              </option>
              {% endfor %}
            </select>
          </div>
          <button class="btn btn-primary w-100" type="submit">进入</button>
        </form>
        <p class="text-muted small mt-3 mb-0">
          行权限 + 列权限在登录后生效；管理员账号：<code>admin</code>
        </p>
      </div>
    </div>
  </div>
</div>
{% endblock %}
